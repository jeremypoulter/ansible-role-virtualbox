---
# defaults file for stefanhorning.virtualbox

virtualbox_version: latest
# Set to "auto" to install extpack matching the installed VirtualBox version.
virtualbox_extpack_version: auto
# Use "master"/"develop" or a release tag (for example "7.0-3").
virtualbox_php_version: master

# Should not need changing:
virtualbox_repo_base_url: "https://download.virtualbox.org/virtualbox"

virtualbox_user: vbox
virtualbox_user_pw: changeme

virtualbox_install: true
virtualbox_php_install: true
# Set to true to actively remove a previous phpVirtualBox install (web files and
# the vboxweb-service unit). Has no effect while virtualbox_php_install is true.
virtualbox_php_uninstall: false

virtualbox_debian_release: "{{ ansible_facts['distribution_release'] }}"
