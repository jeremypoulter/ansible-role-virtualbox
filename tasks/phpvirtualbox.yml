# phpVirtualBox setup:

- name: Install Apache and PHP packages for phpVirtualBox
  ansible.builtin.apt:
    name: "{{ virtualbox_php_packages }}"
    state: present

- name: Make sure webdir for phpVirtualBox exists
  ansible.builtin.file:
    path: /var/www/html/
    state: directory
    mode: "0755"

- name: Determine if phpVirtualBox is already installed (use vboxinit file as indicator)
  ansible.builtin.stat:
    path: /var/www/html/vboxinit
  register: virtualbox_phpvirtualbox_file

- name: Delete default index.html from apache
  ansible.builtin.file:
    path: /var/www/html/index.html
    state: absent
  when: not virtualbox_phpvirtualbox_file.stat.exists

- name: Set phpVirtualBox download URL
  ansible.builtin.set_fact:
    virtualbox_phpvirtualbox_download_url: >-
      {{
        'https://github.com/phpvirtualbox/phpvirtualbox/archive/refs/heads/' ~ virtualbox_php_version ~ '.zip'
        if virtualbox_php_version in ['master', 'develop']
        else 'https://github.com/phpvirtualbox/phpvirtualbox/archive/refs/tags/' ~ virtualbox_php_version ~ '.zip'
      }}
  when: not virtualbox_phpvirtualbox_file.stat.exists

- name: Ensure temporary phpVirtualBox extraction directory is absent
  ansible.builtin.file:
    path: /tmp/phpvirtualbox-install
    state: absent
  when: not virtualbox_phpvirtualbox_file.stat.exists

- name: Create temporary phpVirtualBox extraction directory
  ansible.builtin.file:
    path: /tmp/phpvirtualbox-install
    state: directory
    mode: "0755"
  when: not virtualbox_phpvirtualbox_file.stat.exists

- name: Download and unpack phpVirtualBox release
  ansible.builtin.unarchive:
    src: "{{ virtualbox_phpvirtualbox_download_url }}"
    remote_src: true
    dest: /tmp/phpvirtualbox-install
  when: not virtualbox_phpvirtualbox_file.stat.exists

- name: Find unpacked phpVirtualBox source directory
  ansible.builtin.find:
    paths: /tmp/phpvirtualbox-install
    patterns: "phpvirtualbox-*"
    file_type: directory
    recurse: false
  register: virtualbox_phpvirtualbox_source_dirs
  when: not virtualbox_phpvirtualbox_file.stat.exists

- name: Fail if phpVirtualBox source directory was not extracted
  ansible.builtin.fail:
    msg: "phpVirtualBox archive did not extract as expected from {{ virtualbox_phpvirtualbox_download_url }}"
  when:
    - not virtualbox_phpvirtualbox_file.stat.exists
    - virtualbox_phpvirtualbox_source_dirs.matched | int == 0

- name: Copy phpVirtualBox files into web root
  ansible.builtin.copy:
    src: "{{ (virtualbox_phpvirtualbox_source_dirs.files | map(attribute='path') | first) }}/"
    dest: /var/www/html/
    remote_src: true
    mode: preserve
  when:
    - not virtualbox_phpvirtualbox_file.stat.exists
    - virtualbox_phpvirtualbox_source_dirs.matched | int > 0

- name: Clean temporary phpVirtualBox extraction directory
  ansible.builtin.file:
    path: /tmp/phpvirtualbox-install
    state: absent
  when: not virtualbox_phpvirtualbox_file.stat.exists

- name: Configure phpVirtualBox
  ansible.builtin.template:
    src: config.php.j2
    dest: /var/www/html/config.php
    mode: "0644"

- name: Configure vboxweb daemon user
  ansible.builtin.template:
    src: virtualbox.j2
    dest: /etc/default/virtualbox
    mode: "0644"
  notify:
    - Restart vboxweb-service

- name: Install vboxweb-service systemd unit
  ansible.builtin.template:
    src: vboxweb-service.service.j2
    dest: /etc/systemd/system/vboxweb-service.service
    mode: "0644"
  notify:
    - Restart vboxweb-service

- name: Enable vboxweb daemon on startup
  ansible.builtin.systemd_service:
    name: vboxweb-service
    enabled: true
    daemon_reload: true
