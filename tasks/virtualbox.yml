---
# Virtualbox setup

- name: Install build tools, dkms and kernel headers (required to build vboxdrv)
  ansible.builtin.apt:
    name:
      - build-essential
      - dkms
      - unzip
      - gnupg
      - "linux-headers-{{ ansible_facts['kernel'] }}"
      - linux-headers-generic
    state: present
    update_cache: true

- name: Add VirtualBox repo
  ansible.builtin.deb822_repository:
    name: oracle-virtualbox
    types: [deb]
    uris: "{{ virtualbox_repo_base_url }}/debian"
    suites: ["{{ virtualbox_debian_release }}"]
    components: [contrib]
    architectures: [amd64]
    signed_by: https://www.virtualbox.org/download/oracle_vbox_2016.asc
    state: present

- name: "Install virtualbox in version {{ virtualbox_version }}"
  ansible.builtin.apt:
    name: "{{ 'virtualbox' if (virtualbox_version | string) in ['latest', 'present', 'current'] else 'virtualbox-' ~ virtualbox_version }}"
    state: present
    update_cache: true

- name: Check whether vboxdrv kernel module is loaded
  ansible.builtin.stat:
    path: /dev/vboxdrv
  register: virtualbox_vboxdrv

- name: Ensure VirtualBox DKMS kernel modules are built for the running kernel
  ansible.builtin.command: "dkms autoinstall --kernelver {{ ansible_facts['kernel'] }}"
  register: virtualbox_dkms_build
  changed_when: >-
    'building' in (virtualbox_dkms_build.stdout | lower)
    or 'installing' in (virtualbox_dkms_build.stdout | lower)
  failed_when:
    - virtualbox_dkms_build.rc != 0
    - "'already installed' not in (virtualbox_dkms_build.stdout | lower)"
  when: not virtualbox_vboxdrv.stat.exists

- name: Load VirtualBox kernel modules
  community.general.modprobe:
    name: "{{ item }}"
    state: present
    persistent: present
  loop:
    - vboxdrv
    - vboxnetflt
    - vboxnetadp

- name: Read installed VirtualBox version
  ansible.builtin.command: VBoxManage --version
  register: virtualbox_vbox_version
  changed_when: false

- name: Parse VirtualBox version from VBoxManage output
  ansible.builtin.set_fact:
    # The version is always the last output line (any warnings are emitted first).
    # VBoxManage prints e.g. "7.2.6_Ubuntur172322" or "7.2.6r172322"; strip the
    # build/revision suffix to get a clean X.Y.Z version without fragile regex.
    virtualbox_detected_version: >-
      {{ (virtualbox_vbox_version.stdout_lines | default(['']) | last | default('')).split('_')[0].split('r')[0] | trim }}

- name: Fail when VirtualBox version cannot be parsed
  ansible.builtin.fail:
    msg: >-
      Could not parse a valid VirtualBox version from VBoxManage output.
      stdout={{ virtualbox_vbox_version.stdout | default('') }}
      stderr={{ virtualbox_vbox_version.stderr | default('') }}
  when:
    - (virtualbox_extpack_version | string) == 'auto'
    - virtualbox_detected_version | length == 0

- name: Set extension pack target version
  ansible.builtin.set_fact:
    virtualbox_extpack_target_version: >-
      {{
        virtualbox_detected_version
        if (virtualbox_extpack_version | string) == 'auto'
        else virtualbox_extpack_version
      }}

- name: Read installed extension packs
  ansible.builtin.command: VBoxManage list extpacks
  register: virtualbox_extpack_list
  changed_when: false

- name: Determine installed extension pack version
  ansible.builtin.set_fact:
    virtualbox_extpack_installed_version: "{{ virtualbox_extpack_list.stdout | regex_findall('Version:\\s*([0-9.]+)') | first | default('') }}"

- name: Download VirtualBox extension pack
  ansible.builtin.get_url:
    # VirtualBox 7.x dropped the "VM_" infix (rebranded to "Oracle VirtualBox").
    url: "{{ virtualbox_repo_base_url }}/{{ virtualbox_extpack_target_version }}/Oracle_VirtualBox_Extension_Pack-\
{{ virtualbox_extpack_target_version }}.vbox-extpack"
    dest: /tmp/
    force: true
    mode: "0644"
  register: virtualbox_download_result
  when: virtualbox_extpack_installed_version != virtualbox_extpack_target_version

- name: Output downloaded VirtualBox extension pack file name
  ansible.builtin.debug:
    var: virtualbox_download_result.dest
    verbosity: 1
  when: virtualbox_extpack_installed_version != virtualbox_extpack_target_version

- name: Install VirtualBox extension pack
  ansible.builtin.command: "VBoxManage extpack install --replace {{ virtualbox_download_result.dest }}"
  args:
    stdin: "y\n"
  register: virtualbox_extpack_install
  changed_when: >-
    'successfully installed' in (virtualbox_extpack_install.stdout | lower)
    or 'successfully installed' in (virtualbox_extpack_install.stderr | lower)
    or 'successfully replaced' in (virtualbox_extpack_install.stdout | lower)
    or 'successfully replaced' in (virtualbox_extpack_install.stderr | lower)
  when: virtualbox_extpack_installed_version != virtualbox_extpack_target_version

- name: Add user to run virtualbox deamon
  ansible.builtin.user:
    name: "{{ virtualbox_user }}"
    create_home: true
    shell: '/bin/bash'
    state: present
    append: true
    groups: vboxusers
    update_password: on_create
    password: "{{ virtualbox_user_pw | string | password_hash('sha512') }}"

- name: Create a folder for ISO files to be shared with phpVirtualBox
  ansible.builtin.file:
    path: /home/{{ virtualbox_user }}/isos
    owner: "{{ virtualbox_user }}"
    group: vboxusers
    mode: "0770"
    state: directory
